<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root may own the netmnt service name and run the daemon. -->
  <policy user="root">
    <allow own="org.netmnt"/>
    <allow send_destination="org.netmnt"/>
    <allow receive_sender="org.netmnt"/>
  </policy>

  <!-- Any local user may call the daemon; method-level access is gated by polkit. -->
  <policy context="default">
    <allow send_destination="org.netmnt"
           send_interface="org.netmnt.Manager1"/>
    <allow receive_sender="org.netmnt"/>
  </policy>
</busconfig>
